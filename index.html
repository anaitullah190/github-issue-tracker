<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="bg-slate-100 text-slate-800">
    <!-- Login Page -->
    <section
      id="loginPage"
      class="min-h-screen flex items-center justify-center px-4 py-10 hidden"
    >
      <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
        <div class="text-center mb-8">
          <div
            class="w-20 h-20 mx-auto rounded-full bg-slate-900 text-white flex items-center justify-center text-4xl mb-4"
          >
            <span>🐙</span>
          </div>
          <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
          <p class="text-slate-500 mt-1">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label for="username" class="block text-sm font-medium mb-1"
              >Username</label
            >
            <input
              id="username"
              type="text"
              placeholder="Enter Username"
              class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-violet-500"
            />
            <p class="text-xs text-violet-600 mt-1">Default: admin</p>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium mb-1"
              >Password</label
            >
            <input
              id="password"
              type="password"
              placeholder="Enter Password"
              class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-violet-500"
            />
            <p class="text-xs text-violet-600 mt-1">Default: admin123</p>
          </div>

          <button
            type="submit"
            class="w-full bg-violet-600 hover:bg-violet-700 text-white font-semibold py-3 rounded-lg transition"
          >
            Sign In
          </button>
        </form>

        <div class="my-5 flex items-center gap-3">
          <div class="h-px flex-1 bg-slate-200"></div>
          <span class="text-sm text-slate-400">OR</span>
          <div class="h-px flex-1 bg-slate-200"></div>
        </div>

        <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm">
          <p class="text-slate-500 mb-2 font-medium">Demo Credentials:</p>
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>

        <p id="loginError" class="text-red-500 text-sm mt-4 hidden"></p>
      </div>
    </section>

    <!-- Main Page -->
    <section id="appPage" class=" min-h-screen">
      <!-- Navbar -->
      <nav class="bg-white shadow-sm border-b border-slate-200">
        <div
          class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-slate-900 text-white flex items-center justify-center text-xl"
            >
              🐙
            </div>
            <div>
              <h2 class="text-lg font-bold">GitHub Issues Tracker</h2>
              <p class="text-xs text-slate-500">
                Track and manage project issues
              </p>
            </div>
          </div>

          <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
            <input
              id="searchInput"
              type="text"
              placeholder="Search issues..."
              class="w-full md:w-72 border border-slate-300 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-violet-500"
            />
            <button
              id="searchBtn"
              class="bg-violet-600 hover:bg-violet-700 text-white px-5 py-2.5 rounded-lg font-medium"
            >
              Search
            </button>
            <button
              id="logoutBtn"
              class="bg-slate-200 hover:bg-slate-300 text-slate-800 px-5 py-2.5 rounded-lg font-medium"
            >
              Logout
            </button>
          </div>
        </div>
      </nav>

      <!-- Content -->
      
    </section>

    <script src="./js/script.js"></script>
  </body>
</html>
